<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Intro section with dropdown navigation</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <nav class="header__nav">
          <img src="./images/logo.svg" alt="Snap Logo" class="header__logo" />
          <img
            src="./images/icon-menu.svg"
            alt="Menu Icon"
            class="header__hamburger"
          />
        </nav>
      </header>
      <main class="hero">
        <div class="hero__image"></div>
        <section class="hero__content">
          <h1 class="hero__title">Make remote work</h1>
          <p class="hero__description">
            Get your team in sync, no matter your location. Streamline
            processes, create team rituals, and watch productivity soar.
          </p>
          <button class="hero__button">Learn more</button>
          <section class="hero__clients">
            <img src="./images/client-databiz.svg" alt="Databiz logo" />
            <img src="./images/client-audiophile.svg" alt="Audiophile logo" />
            <img src="./images/client-meet.svg" alt="Meet logo" />
            <img src="./images/client-maker.svg" alt="Make logo" />
          </section>
        </section>
      </main>
    </div>

    <!-- 
  Features
  Company
  Careers
  About

  Login
  Register -->
    <script src="./app.js"></script>
  </body>
</html>
